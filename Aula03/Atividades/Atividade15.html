<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira o seu peso:</p>
    <input type="text" id="ipt_peso">
    <p>Insira a sua altura:</p>
    <input type="text" id="ipt_altura">
    <br>
    <button onclick="calcular()">Calcular IMC</button>
    <p id="p_r"></p>
</body>
</html>
<script>
    function calcular() {
        let peso = Number(ipt_peso.value);
        let altura = Number(ipt_altura.value);
    
        let imc = peso / (altura * altura);
    
        p_r.innerHTML = `Seu IMC é ${imc.toFixed(2)}`;
    }
</script>
