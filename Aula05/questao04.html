<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>
function exibirResultado() {
  div_mensagem.innerHTML = '';
    let qualidade = ipt_qualidade.value;
    let valorBase = 0;

    if (qualidade == '720p') {
        valorBase = 15;
    } else if (qualidade == '1080p') {
        valorBase = 20;
    } else {
        valorBase = 25;
    }

    div_mensagem.innerHTML += `<br>O valor base do seu plano é R$${valorBase.toFixed(2)}`;

    let quantidadeTelas = Number(ipt_qtd_telas.value);
    let quantidadeTelasExtras = Number(ipt_qtd_telas_extras.value);

    let valorTelas = 0;

    if (quantidadeTelas <= 2) {
        valorTelas = 10;
    } else if (quantidadeTelas <= 4) {
        valorTelas = 20;
    } else {
        valorTelas = 30;
    }

    valorTelas += quantidadeTelasExtras * 12.9

    div_mensagem.innerHTML += `<br>O valor das telas do seu plano é R$${valorTelas.toFixed(2)}`;

    let download = ipt_download.value;

    let valorTotal = valorBase + valorTelas;

    if (download == 'sim') {
      let porcentagem = 5 + quantidadeTelas;
      valorTotal *= (porcentagem / 100) + 1;
      div_mensagem.innerHTML += `<br>Você optou por fazer download e por isso sua conta irá subir em ${porcentagem}%`;
    } else {
      valorTotal *= 0.9;
      div_mensagem.innerHTML += `<br>Você optou por não fazer download e por isso sua conta será reduzida em 10%`;
    }

    div_mensagem.innerHTML += `<br>Valor final: R$${valorTotal.toFixed(2)}`;

    let quantidadePessoas = quantidadeTelas + quantidadeTelasExtras;

    if (quantidadePessoas > 0) {
      let valorPessoa = valorTotal / quantidadePessoas;
    
      div_mensagem.innerHTML += `<br>Se quiser dividir fica R$${valorPessoa.toFixed(2)} para cada!`;
    }
}
</script>
