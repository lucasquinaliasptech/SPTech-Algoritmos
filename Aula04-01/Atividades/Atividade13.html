<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira o texto que deseja validar:</p>
    <input type="text" id="ipt_texto">
    <br>
    <br>
    <button onclick="validar()">Validar Palíndromo</button>
    <p id="p_resultado"></p>
</body>
</html>
<script>
    function validar () {
        let texto = ipt_texto.value;
        let invertido = '';
        p_resultado.innerHTML = ``;

        texto = texto.replaceAll(' ','');
        texto = texto.toLowerCase();

        for (let i = 0; i < texto.length; i++) {
            invertido += texto[texto.length - i - 1]; 
        }

        texto == invertido ? p_resultado.innerHTML = `A frase ${texto} é um palíndromo e invertida fica ${invertido}` : p_resultado.innerHTML = `A frase ${texto} não é um palíndromo e invertida fica ${invertido}`;
    }
</script>
