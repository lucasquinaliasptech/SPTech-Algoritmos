<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira o nome da música:</p>
    <input type="text" id="ipt_musica">
    <p>De...</p>
    <input type="text" id="ipt_a">
    <p>Até...</p>
    <input type="text" id="ipt_b">
    <br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <button onclick="exibir()">Exibir</button>
    <button onclick="filtrar()">Filtrar</button>
    <p id="p_resultado"></p>
</body>
</html>
<script>
    let musicas = [];

    function cadastrar() {
        let musica = ipt_musica.value;

        musicas.push(musica);
    }

    function exibir() {
        p_resultado.innerHTML = ``;

        for (let i = 0; i < musicas.length; i++) {
            p_resultado.innerHTML += `${musicas[i]}<br>`;
        }
    }
    
    function filtrar() {
        p_resultado.innerHTML = ``;
        let a = Number(ipt_a.value);
        let b = Number(ipt_b.value);
        
        if (a < b) {
            for (let i = a - 1; i < b; i++) {
                p_resultado.innerHTML += `${musicas[i]}<br>`;
            }
        } else {
            p_resultado.innerHTML += `O primeiro valor deve ser menor do que o segundo!`;
        }
    }
</script>
