<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="sortear()">Sortear Nota para aluno</button>
    <p id="p_resultado"></p>
</body>
</html>
<script>
    function sortear() {
        let nota = (Math.random() * (10 - 0) + 0).toFixed(1);

        p_resultado.innerHTML = `${nota}`;
    }
</script>
