<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="add(1)">+1</button>
    <button onclick="add(5)">+5</button>
    <button onclick="add(-1)">-1</button>
    <button onclick="add(-5)">-5</button>
    <div id="div_contador">0</div>
</body>
</html>
<script>
    // funcoes-com-parametro.html
    let contador = 0;

    function add(valor) {
        contador += valor;
        div_contador.innerHTML = contador;
    }
</script>
