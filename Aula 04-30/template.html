<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>Buscar Filmes:</h2>

  <span>Nome:</span>
  <input type="text" id="ipt_nome">
  <button onclick="pesquisarNome()">Pesquisar</button>

  <span>Diretor:</span>
  <input type="text" id="ipt_diretor">
  <button onclick="pesquisarDiretor()">Pesquisar</button>

  <span>Ano:</span>
  <select id="ipt_ano_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="number" id="ipt_ano">
  <button onclick="pesquisarAno()">Pesquisar</button><br><br>

  <span>Gênero:</span>
  <input type="text" id="ipt_genero">
  <button onclick="pesquisarGenero()">Pesquisar</button>

  <span>Média:</span>
  <select id="ipt_media_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="text" id="ipt_media">
  <button onclick="pesquisarMedia()">Pesquisar</button><br><br>

  <button onclick="pesquisar()">Mostrar Todos</button>

  <div id="div_resultado"></div>
</body>

</html>
<script src="dados.js"></script>
<script>
  function calcularMedia(array) {
    let soma = 0;

    for (let i = 0; i < array.length; i++) {
      soma += array[i];
    }

    return (soma / array.length).toFixed(2);
  }

  function exibir(array, busca, propriedade) {
    div_resultado.innerHTML = ``;

    for (let i = 0; i < array.length; i++) {
      array[i][propriedade].toLowerCase().includes(busca) ? div_resultado.innerHTML += `Nome: ${array[i].nome} | Diretor: ${array[i].diretor} | Ano: ${array[i].ano} | Média: ${calcularMedia(array[i].notas)}<br>` : ``;
    }
  }

  function pesquisarNome() {
    let busca = (ipt_nome.value).toLowerCase();

    exibir(filmes, busca, "nome");
  }

  function pesquisarDiretor() {
    let busca = (ipt_diretor.value).toLowerCase();

    exibir(filmes, busca, "diretor");
  }

  function pesquisarAno() {
    let busca = Number(ipt_ano.value);
    let sinal = ipt_ano_parametro.value;

    div_resultado.innerHTML = ``;

    if (sinal == `maior_igual`) {
      for (let i = 0; i < filmes.length; i++) {
        filmes[i].ano >= busca ? div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>` : ``;
      }
    } else if (sinal == `menor_igual`) {
      for (let i = 0; i < filmes.length; i++) {
        filmes[i].ano <= busca ? div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>` : ``;
      }
    } else {
      for (let i = 0; i < filmes.length; i++) {
        filmes[i].ano == busca ? div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>` : ``;
      }
    }
  }

  function pesquisarGenero() {
    let busca = (ipt_genero.value).toLowerCase();

    div_resultado.innerHTML = ``;

    for (let i = 0; i < filmes.length; i++) {
      for (let j = 0; j < filmes[i].generos.length; j++) {
        filmes[i].generos[j].toLowerCase().includes(busca) ? (div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>`, i++) : ``;
      }
    }
  }

  function pesquisarMedia() {
    let busca = Number(ipt_media.value);
    let sinal = ipt_media_parametro.value;

    div_resultado.innerHTML = ``;

    if (sinal == `maior_igual`) {
      for (let i = 0; i < filmes.length; i++) {
        calcularMedia(filmes[i].notas) >= busca ? div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>` : ``;
      }
    } else if (sinal == `menor_igual`) {
      for (let i = 0; i < filmes.length; i++) {
        calcularMedia(filmes[i].notas) <= busca ? div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>` : ``;
      }
    } else {
      for (let i = 0; i < filmes.length; i++) {
        calcularMedia(filmes[i].notas) == busca ? div_resultado.innerHTML += `Nome: ${filmes[i].nome} | Diretor: ${filmes[i].diretor} | Ano: ${filmes[i].ano} | Média: ${calcularMedia(filmes[i].notas)}<br>` : ``;
      }
    }
  }

  function pesquisar() {
    exibir(filmes, ``, "nome");
  }
</script>
