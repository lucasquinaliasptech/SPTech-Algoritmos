<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira o seu login:</p>
    <input type="text" id="ipt_login">
    <p>Insira o seu senha:</p>
    <input type="text" id="ipt_senha">
    <p>Insira o seu ano de nascimento ou o nome do seu animal de estimação:</p>
    <input type="text" id="ipt_info">
    <br>
    <button onclick="autenticar()">Autenticar</button>
    <p id="p_mensagem"></p>
</body>
</html>
<script>
    function autenticar() {
        let login = ipt_login.value;
        let senha = ipt_senha.value;
        let info = ipt_info.value;

        if (login == 'ana' && senha == 'braga' && (info == '1949' || info == 'louro josé')) {
            p_mensagem.innerHTML = `Usuário autenticado`;
        } else {
            p_mensagem.innerHTML = `Falha na autenticação`;
        }
    }
</script>
