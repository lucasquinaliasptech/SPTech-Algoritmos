<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira a nota do atendimento:</p>
    <input type="text" id="ipt_nota">
    <br>
    <button onclick="avaliar()">Avaliar atendimento</button>
    <p id="p_mensagem"></p>
</body>
</html>
<script>
    function avaliar() {
        let nota = Number(ipt_nota.value);
        let mensagem;

        if (nota > 10 || nota < 0) {
            mensagem = 'Nota inválida';
        } else if (nota < 5) {
            mensagem = 'Não aprovado';
        } else if (nota < 7) {
            mensagem = 'Neutro';
        } else {
            mensagem = 'Aprovado';
        }

        p_mensagem.innerHTML = `${mensagem}`;
    }
</script>
