<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="dizer()">Diga algo sobre a matéria de Algoritmos</button>
    <p id="p_mensagem"></p>
</body>
</html>
<script>
    function dizer() {
        let contador = 1;

        while (contador <= 7) {
            p_mensagem.innerHTML += `<br>Oi, está funcionando!`;
            contador++;
        }
    }
</script>
