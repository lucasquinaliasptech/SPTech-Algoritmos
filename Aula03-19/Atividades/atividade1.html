<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="contar()">Contar</button>
    <p id="p_mensagem"></p>
</body>
</html>
<script>
    function contar() {
        contador = 1;

        while (contador <= 15) {
            p_mensagem.innerHTML += `${contador}<br>`;
            contador++;
        }
    }
</script>
