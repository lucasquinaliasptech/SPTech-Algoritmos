<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select id="ipt_tabuada">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
    </select>
    <p>Até qual número a tabuada deve ser construída?</p>
    <input type="text" id="ipt_numero">
    <br>
    <br>
    <button onclick="calcular()">Ver Tabuada</button>
    <div id="div_mensagem"><div>
</body>
</html>
<script>
    function calcular() {
        div_mensagem.innerHTML = '';

        let tabuada = Number(ipt_tabuada.value);
        let numero = Number(ipt_numero.value);

        let contador = 1;

        while (contador <= numero) {
            if (contador % 2 == 0) {
                div_mensagem.innerHTML += `<p style='color: blue'>${tabuada} x ${contador} = ${tabuada * contador}</p>`;
            } else {
                div_mensagem.innerHTML += `<p style='color: red'>${tabuada} x ${contador} = ${tabuada * contador}</p>`;
            }
            contador++;
        }
    }
</script>
