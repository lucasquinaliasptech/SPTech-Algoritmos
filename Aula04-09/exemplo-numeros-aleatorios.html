<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="exibirNumeroAleatorio()">Exibir Número Aleatório</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function exibirNumeroAleatorio() {
        let numeroAleatorio = Math.random() * (20 - 10) + 10;
        div_mensagem.innerHTML = numeroAleatorio.toFixed(0);
    }
</script>
