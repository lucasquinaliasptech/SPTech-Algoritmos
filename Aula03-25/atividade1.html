    function verificar () {
        let num = Number(ipt_numero.value);
        let contador = 0;

        p_mensagem.innerHTML = `Divisores do Número ${num}:`

        for (let i = 0; i <= num; i++) {
            
            if ((num % i) == 0) {
                p_mensagem.innerHTML += `<br>${i}`
                contador++;
            }
    
            if (i == num && contador == 2) {
                p_mensagem.innerHTML += `<br>O número ${num} é um número primo.`
            }
        }
    }
