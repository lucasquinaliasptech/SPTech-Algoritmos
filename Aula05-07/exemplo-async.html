<script>
    console.log(`Antes do timeout`);

    let consulta = new Promise((resolve, reject) => {
        setTimeout(() => {
            //resolve(`Timeout`);
            reject(new Error(`Não foi possível prometer a promessa :(`))
        }, 5000);
    });

    consulta.then(valor => {
        console.log(`Caiu no Then`);
        console.log(valor);
    }).catch(erro => {
        console.log(`Caiu no Catch`);
        console.log(erro);
    });

    console.log(consulta);

    console.log(`Depois do Timeout`);

    fetch(`https://viacep.com.br/ws/01001000/json/`)
    .then(resposta => {
        return resposta.json();
    }).then(json => {
        console.log(json)
    }).catch(erro => {
        console.error(erro);
    });

    async function viaCep() {
        let resposta = await fetch(`https://viacep.com.br/ws/01001000/json/`);
        let json = await resposta.json();
        console.log(json);
    }

    viaCep();
    console.log(`Final!`);
</script>
