<script>
    // HOF -> High Order Function -> Função de Alta Ordem

    // Arrow function
    let fSomar = (n1, n2) => {
        console.log(n1 + n2);
    }

    // Função anônima (não possui nome)
    let fDividir = function (n1, n2) {
        console.log(n1 / n2)
    }

    function executar(func, n1, n2) {
        func(n1, n2);
    }
</script>
